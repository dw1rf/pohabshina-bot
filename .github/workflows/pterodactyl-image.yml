name: Build Pterodactyl voice image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Dockerfile.pterodactyl
      - requirements.txt
      - bot.py
      - bot_client.py
      - cogs/**
      - services/**
      - utils/**
      - .github/workflows/pterodactyl-image.yml

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.pterodactyl
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:pterodactyl-voice
            ghcr.io/${{ github.repository }}:${{ github.sha }}
